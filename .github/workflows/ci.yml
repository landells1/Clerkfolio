name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: every job here only needs to read the repo.
# No job pushes commits, creates releases, or comments on PRs, so withhold
# every other permission. CodeQL flagged this (alerts #10-#14).
permissions:
  contents: read

env:
  NODE_VERSION: '24.x'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    # CRITICAL: Vercel also runs `next build`. This job is the authoritative
    # build gate — it catches ESLint errors that `tsc --noEmit` misses.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Inject dummy build env
        run: |
          cat > .env.local <<'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://dldhnstjngendpcywthv.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy.dummy
          RESEND_API_KEY=re_dummy_ci_build_key
          EOF
      - run: npm run build
        env:
          CI: true
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # E2E requires a live app and test-project credentials. The job is
    # defined here so it blocks PRs when the secrets are available; it
    # self-skips gracefully when they are not (startup check in global-setup).
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Inject E2E build env
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_TEST_PRICE_ID: ${{ secrets.STRIPE_TEST_PRICE_ID }}
          STRIPE_TEST_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
        run: |
          SUPABASE_URL="${SUPABASE_TEST_URL:-https://dldhnstjngendpcywthv.supabase.co}"
          SUPABASE_ANON_KEY="${SUPABASE_TEST_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy.dummy}"
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          RESEND_API_KEY=re_dummy_ci_build_key
          EOF
          # Map the *_TEST_* secrets the e2e job uses onto the env names the
          # app reads at runtime. Without this the app server runs with
          # STRIPE_SECRET_KEY undefined and the Stripe E2E spec (which DOES
          # have its own STRIPE_TEST_SECRET_KEY) hits a broken /api/stripe/*.
          if [ -n "$SUPABASE_TEST_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_TEST_SERVICE_ROLE_KEY" >> .env.local
          fi
          if [ -n "$STRIPE_TEST_SECRET_KEY" ]; then
            echo "STRIPE_SECRET_KEY=$STRIPE_TEST_SECRET_KEY" >> .env.local
          fi
          if [ -n "$STRIPE_TEST_PRICE_ID" ]; then
            echo "STRIPE_PRICE_ID=$STRIPE_TEST_PRICE_ID" >> .env.local
          fi
          if [ -n "$STRIPE_TEST_WEBHOOK_SECRET" ]; then
            echo "STRIPE_WEBHOOK_SECRET=$STRIPE_TEST_WEBHOOK_SECRET" >> .env.local
          fi
      - name: Build app
        run: npm run build
        env:
          CI: true
      - name: Start app in background
        # `&` only backgrounds the LAST command in a chain - the prior
        # `npm run build && npm run start &` was parsed as
        # `(build && start) &`, so the whole expression returned in <5s
        # while the build was still running, and wait-on then polled an
        # empty port until it timed out. Split build (foreground above)
        # from start (background here), and use `nohup` so the spawned
        # next-server survives the step boundary.
        run: nohup npm run start > /tmp/clerkfolio-e2e.log 2>&1 &
        env:
          CI: true
      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000 --timeout 90000
      - run: npm run e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:3000
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_TEST_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
